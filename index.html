<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EncMaster Classic | Universal Vault</title>
    <style>
        :root { --primary: #3498db; --bg: #1a252f; --card: #2c3e50; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav { width: 100%; background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid #34495e; }
        .container { width: 90%; max-width: 400px; margin-top: 40px; text-align: center; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #34495e; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; background: #1a252f; color: white; text-align: center; font-size: 1.1em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tile { background: #34495e; padding: 25px 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .tile:active { background: var(--primary); transform: scale(0.95); }
        .tile i { font-size: 2em; display: block; margin-bottom: 10px; font-style: normal; }
        .tile span { font-size: 0.8em; font-weight: bold; }
        #status { margin-top: 25px; font-size: 0.9em; color: #f1c40f; min-height: 40px; }
    </style>
</head>
<body>

    <div class="nav">
        <h2 style="margin:0; color:var(--primary);">🔐 EncMaster Classic</h2>
    </div>

    <div class="container">
        <div class="card">
            <input type="password" id="p" placeholder="Set Vault Password">
            <div class="grid">
                <div class="tile" onclick="document.getElementById('f').click()">
                    <i>📦</i><span>CREATE VAULT</span>
                </div>
                <div class="tile" onclick="window.location.reload()">
                    <i>🔄</i><span>REFRESH</span>
                </div>
            </div>
            <input type="file" id="f" style="display:none" onchange="wrapFile()">
            <div id="status">Files will auto-play or display immediately upon decryption.</div>
        </div>
    </div>

    <script>
        function wrapFile() {
            const fileInput = document.getElementById('f');
            const file = fileInput.files[0];
            const pass = document.getElementById('p').value;
            const status = document.getElementById('status');

            if (!pass) { alert("Please set a password first!"); return; }
            status.innerText = "⚙️ Encoding " + file.name + "...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                const fileType = file.type;

                const vaultHTML = `
<!DOCTYPE html>
<html>
<head>
    <title>🔐 Locked: ${file.name}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #1a252f; color: white; text-align: center; padding: 50px 20px; }
        .box { background: #2c3e50; padding: 30px; border-radius: 20px; border: 2px solid #3498db; display: inline-block; max-width: 500px; width: 100%; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; background: #1a252f; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #viewer { margin-top: 20px; width: 100%; }
        img, video { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="login-screen" class="box">
        <h2 style="color:#3498db">🔐 EncMaster Vault</h2>
        <p>Protected Content: <b>${file.name}</b></p>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="unlock()">UNLOCK & VIEW</button>
    </div>
    <div id="content-screen" style="display:none;">
        <h2 style="color:#2ecc71">✅ Access Granted</h2>
        <div id="viewer"></div>
        <br>
        <button onclick="window.location.reload()" style="background:#e74c3c; padding:10px 20px; color:white; border:none; border-radius:5px; cursor:pointer;">LOCK AGAIN</button>
    </div>
    <script>
        function unlock() {
            if(document.getElementById('pass').value === '${pass}') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('content-screen').style.display = 'block';
                const viewer = document.getElementById('viewer');
                const data = "${base64Data}";
                const type = "${fileType}";

                if (type.startsWith('image/')) {
                    viewer.innerHTML = '<img src="' + data + '">';
                } else if (type.startsWith('video/')) {
                    viewer.innerHTML = '<video controls autoplay src="' + data + '"></video>';
                } else if (type.startsWith('audio/')) {
                    viewer.innerHTML = '<audio controls autoplay src="' + data + '"></audio>';
                } else if (type === 'application/pdf') {
                    viewer.innerHTML = '<iframe src="' + data + '" width="100%" height="500px"></iframe>';
                } else {
                    viewer.innerHTML = '<p>This file type is not supported for direct preview, but you can download it.</p><a href="' + data + '" download="${file.name}" style="color:#3498db; text-decoration:none; font-weight:bold;">DOWNLOAD FILE</a>';
                }
            } else { alert('❌ Wrong Password!'); }
        }
    <\/script>
</body>
</html>`;

                const blob = new Blob([vaultHTML], {type: "text/html"});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = file.name + "_VAULT.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                status.innerHTML = "✅ **Vault Created!**<br>The file is now hidden inside the HTML.";
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
