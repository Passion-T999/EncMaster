<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EncMaster v7.0 | Media Vault</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a252f; color: white; text-align: center; padding: 50px 20px; }
        .card { background: #2c3e50; padding: 30px; border-radius: 20px; border: 2px solid #3498db; display: inline-block; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; background: #1a252f; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; color: #f1c40f; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#3498db">🔐 EncMaster v7.0</h2>
        <input type="password" id="p" placeholder="Set Password First">
        <button onclick="document.getElementById('f').click()">📦 CREATE MEDIA VAULT</button>
        <input type="file" id="f" style="display:none" onchange="generateVault()">
        <div id="status">Files will auto-play immediately upon unlocking.</div>
    </div>

    <script>
        function generateVault() {
            const file = document.getElementById('f').files[0];
            const pass = document.getElementById('p').value;
            if (!pass) { alert("Please set a password!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = e.target.result;
                const type = file.type;

                const vault = `
<!DOCTYPE html>
<html>
<head>
    <title>🔐 Encrypted: ${file.name}</title>
    <style>
        body { font-family: sans-serif; background: #1a252f; color: white; text-align: center; padding: 50px; }
        .box { background: #2c3e50; padding: 30px; border-radius: 20px; border: 2px solid #2ecc71; display: inline-block; width: 100%; max-width: 500px; }
        input { width: 80%; padding: 15px; margin: 20px; border-radius: 10px; border: none; text-align: center; }
        button { padding: 15px 30px; background: #2ecc71; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .player { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div id="lock">
        <div class="box">
            <h2>🔐 EncMaster Vault</h2>
            <p>File: ${file.name}</p>
            <input type="password" id="pass" placeholder="Enter Password">
            <br>
            <button onclick="unlock()">UNLOCK & PLAY</button>
        </div>
    </div>
    <div id="view" style="display:none">
        <h2 style="color:#2ecc71">✅ Access Granted</h2>
        <div class="player" id="media"></div>
    </div>
    <script>
        function unlock() {
            if(document.getElementById('pass').value === '${pass}') {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('view').style.display = 'block';
                const m = document.getElementById('media');
                const d = "${data}";
                const t = "${type}";
                if(t.includes('audio')) m.innerHTML = '<audio controls autoplay style="width:100%"><source src="'+d+'"></audio>';
                else if(t.includes('video')) m.innerHTML = '<video controls autoplay style="width:100%"><source src="'+d+'"></video>';
                else if(t.includes('image')) m.innerHTML = '<img src="'+d+'" style="max-width:100%; border-radius:10px;">';
                else m.innerHTML = '<p>Preview unavailable.</p><a href="'+d+'" download="${file.name}" style="color:#2ecc71">Download Original</a>';
            } else { alert('Wrong Password!'); }
        }
    <\/script>
</body>
</html>`;
                const blob = new Blob([vault], {type: "text/html"});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = file.name + "_VAULT.html";
                a.click();
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
