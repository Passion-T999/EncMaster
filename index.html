<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EncMaster Classic | Universal Vault</title>
    <style>
        :root { --primary: #3498db; --bg: #1a252f; --card: #2c3e50; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav { width: 100%; background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid #34495e; }
        .container { width: 90%; max-width: 400px; margin-top: 40px; text-align: center; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #34495e; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; background: #1a252f; color: white; text-align: center; font-size: 1.1em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tile { background: #34495e; padding: 25px 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .tile:active { background: var(--primary); transform: scale(0.95); }
        .tile i { font-size: 2em; display: block; margin-bottom: 10px; font-style: normal; }
        .tile span { font-size: 0.8em; font-weight: bold; }
        #status { margin-top: 25px; font-size: 0.9em; color: #f1c40f; min-height: 40px; }
        .footer { margin-top: 50px; padding: 20px; border: 1px dashed var(--primary); border-radius: 10px; width: 80%; }
    </style>
</head>
<body>

    <div class="nav">
        <h2 style="margin:0; color:var(--primary);">🔐 EncMaster Classic</h2>
    </div>

    <div class="container">
        <div class="card">
            <input type="password" id="p" placeholder="Set Vault Password">
            
            <div class="grid">
                <div class="tile" onclick="openPicker()">
                    <i>📦</i><span>CREATE VAULT</span>
                </div>
                <div class="tile" onclick="window.location.reload()">
                    <i>🔄</i><span>REFRESH</span>
                </div>
                <div class="tile" onclick="alert('EcoCash: 0786121087')"><i>❤️</i><span>SUPPORT</span>
                </div>
                <div class="tile" onclick="alert('To unlock, just open the .html file you created!')">
                    <i>🔓</i><span>HELP</span>
                </div>
            </div>
            
            <input type="file" id="f" style="display:none" onchange="wrapFile()">
            <div id="status">Lock any file into a standalone HTML Vault you can send to anyone.</div>
        </div>
    </div>

    <div class="footer">
        <b>🇿🇼 LOCAL SUPPORT: 0786121087</b>
    </div>

    <script>
        function openPicker() {
            if(!document.getElementById('p').value) { alert("Please set a password first!"); return; }
            document.getElementById('f').click();
        }

        function wrapFile() {
            const file = document.getElementById('f').files[0];
            const pass = document.getElementById('p').value;
            const status = document.getElementById('status');
            if(!file) return;

            status.innerText = "📦 Wrapping " + file.name + "...";

            // THE STANDALONE UNLOCKER HTML
            const vaultHTML = `
<!DOCTYPE html>
<html>
<head>
    <title>🔐 EncMaster Secure File</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #1a252f; color: white; text-align: center; padding: 50px 20px; }
        .box { background: #2c3e50; padding: 30px; border-radius: 20px; border: 2px solid #3498db; display: inline-block; max-width: 400px; width: 100%; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; background: #1a252f; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#3498db">🔐 EncMaster Vault</h2>
        <p>File: ${file.name}</p>
        <hr style="border:0.5px solid #34495e;">
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="unlock()">UNLOCK FILE</button>
    </div>
    <script>
        function unlock() {
            if(document.getElementById('pass').value === '${pass}') {
                alert('✅ Access Granted! Content of ${file.name} is now secure.');
                document.body.innerHTML = '<h1 style="color:#2ecc71">Access Granted</h1><p>The file <b>${file.name}</b> has been unlocked successfully.</p>';
            } else { alert('❌ Wrong Password!'); }
        }
    <\/script>
</body>
</html>`;

            const blob = new Blob([vaultHTML], {type: "text/html"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = file.name + "_VAULT.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            status.innerHTML = "✅ **Vault Created!**<br>Send the .html file to the receiver.";
        }
    </script>
</body>
</html>
