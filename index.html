<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EncMaster v7.3 | Share Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a252f; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .card { background: #2c3e50; padding: 30px; border-radius: 20px; border: 1px solid #3498db; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #1a252f; color: white; text-align: center; box-sizing: border-box; }
        
        .list-btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-purple { background: #9b59b6; color: white; }
        .btn-gray { background: #34495e; color: #bdc3c7; }
        .list-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Share Hub Modal */
        #share-hub { display: none; margin-top: 20px; background: #1a252f; border-radius: 15px; padding: 15px; text-align: left; }
        .hub-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #34495e; font-size: 0.85em; }
        .hub-item:last-child { border: none; }
        .share-icon { cursor: pointer; color: #3498db; font-size: 1.2em; }

        #status { margin-top: 20px; color: #f1c40f; font-size: 0.85em; }
        .footer { margin-top: 30px; font-size: 0.8em; border-top: 1px solid #34495e; padding-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#3498db; margin-bottom: 20px;">🔐 EncMaster v7.3</h2>
        
        <input type="password" id="p" placeholder="Set Master Password">
        
        <hr style="border: 0.5px solid #34495e; margin: 20px 0;">

        <button class="list-btn btn-blue" onclick="document.getElementById('f').click()">
            📦 CREATE MEDIA VAULT
        </button>
        
        <textarea id="note" placeholder="Write a Secure Note here..."></textarea>
        <button class="list-btn btn-green" onclick="generateNoteVault()">
            📝 LOCK SECURE NOTE
        </button>

        <!-- THE NEW SHARE HUB BUTTON -->
        <button class="list-btn btn-purple" onclick="toggleHub()">
            🌐 OPEN SHARE HUB
        </button>

        <div id="share-hub">
            <h4 style="margin:0 0 10px 0; color:#9b59b6;">Recent Vaults:</h4>
            <div id="hub-list">
                <p style="color:#7f8c8d; font-size:0.8em;">No active vaults to share.</p>
            </div>
        </div>

        <button class="list-btn btn-gray" onclick="window.location.reload()">
            🔄 REFRESH SYSTEM
        </button>

        <input type="file" id="f" style="display:none" onchange="generateVault()">
        <div id="status">Ready for secure operations.</div>

        <div class="footer">
            <b style="color:#3498db">🇿🇼 SUPPORT (ECOCASH)</b><br>
            USD/ZiG: 0786121087
        </div>
    </div>

    <script>
        let recentVaults = [];

        function toggleHub() {
            const hub = document.getElementById('share-hub');
            hub.style.display = hub.style.display === 'block' ? 'none' : 'block';
            renderHub();
        }

        function renderHub() {
            const list = document.getElementById('hub-list');
            if (recentVaults.length === 0) return;
            list.innerHTML = recentVaults.map((v, i) => `
                <div class="hub-item">
                    <span>📄 ${v.name.substring(0, 15)}...</span>
                    <span class="share-icon" onclick="shareVault(${i})">📤</span>
                </div>
            `).join('');
        }

        async function shareVault(i) {
            const v = recentVaults[i];
            if (navigator.share) {
                try {
                    const file = new File([v.blob], v.name, { type: "text/html" });
                    await navigator.share({
                        files: [file],
                        title: 'EncMaster Secure Vault',
                        text: 'Sharing a secure file protected by EncMaster.'
                    });
                } catch (err) { alert("Sharing failed: " + err); }
            } else {
                alert("Direct sharing not supported on this browser. Use the download link instead!");
            }
        }

        // --- VAULT GENERATION ---
        function generateVault() {
            const file = document.getElementById('f').files[0];
            const pass = document.getElementById('p').value;
            if (!pass) { alert("Set password!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                const vault = createHTMLVault(file.name, e.target.result, file.type, pass);
                processVault(file.name + "_VAULT.html", vault);
            };
            reader.readAsDataURL(file);
        }

        function generateNoteVault() {
            const note = document.getElementById('note').value;
            const pass = document.getElementById('p').value;
            if (!pass || !note) { alert("Input required!"); return; }

            const data = "data:text/plain;base64," + btoa(note);
            const vault = createHTMLVault("Secure Note", data, "text/plain", pass);
            processVault("Note_VAULT.html", vault);
        }

        function processVault(name, content) {
            const blob = new Blob([content], {type: "text/html"});
            recentVaults.push({ name, blob });
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
            
            document.getElementById('status').innerText = "✅ Vault Created: " + name;
            renderHub();
        }

        function createHTMLVault(name, data, type, pass) {
            return `<!DOCTYPE html><html><head><title>🔐 Vault</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{font-family:sans-serif;background:#1a252f;color:white;text-align:center;padding:50px 20px;}.box{background:#2c3e50;padding:30px;border-radius:20px;border:2px solid #2ecc71;display:inline-block;width:100%;max-width:500px;}input{width:80%;padding:15px;margin:20px;border-radius:10px;border:none;text-align:center;background:#1a252f;color:white;}button{padding:15px 30px;background:#2ecc71;border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer;}</style></head><body><div id="lock"><div class="box"><h2>🔐 EncMaster Vault</h2><p>File: ${name}</p><input type="password" id="pass" placeholder="Enter Password"><br><button onclick="unlock()">UNLOCK</button></div></div><div id="view" style="display:none"><h2 style="color:#2ecc71">✅ Access Granted</h2><div id="media"></div></div><script>function unlock(){if(document.getElementById('pass').value==='${pass}'){document.getElementById('lock').style.display='none';document.getElementById('view').style.display='block';const m=document.getElementById('media');const d="${data}";const t="${type}";if(t.includes('audio'))m.innerHTML='<audio controls autoplay style="width:100%"><source src="'+d+'"></audio>';else if(t.includes('video'))m.innerHTML='<video controls autoplay style="width:100%"><source src="'+d+'"></video>';else if(t.includes('image'))m.innerHTML='<img src="'+d+'" style="max-width:100%;border-radius:10px;">';else if(t.includes('text'))m.innerHTML='<div style="background:#1a252f;padding:20px;border-radius:10px;text-align:left;white-space:pre-wrap;">'+atob(d.split(',')[1])+'</div>';else m.innerHTML='<p>Preview unavailable.</p><a href="'+d+'" download="${name}" style="color:#2ecc71">Download Original</a>';}else{alert('Wrong Password!');}}<\/script></body></html>`;
        }
    </script>
</body>
</html>
